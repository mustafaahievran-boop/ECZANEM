<script>
    // ANAHTAR (Eczaneler.org için başında apikey veya bearer olmadan saf haliyle dene)
    const API_KEY = "0304y1SR9u2lR0ltDXNw41L4uZTEvKuZH8zSdrMkc2QJU0O2B78mQKoxIwEF"; 

    async function fetchData(city) {
        loader.style.display = "block";
        listDiv.innerHTML = "";

        try {
            // URL yapısını ve parametreyi 'city' olarak güncelledik
            const response = await fetch(`https://api.eczaneler.org/v1/duty?city=${city.toLowerCase()}`, {
                method: 'GET',
                headers: {
                    // Bazı API'ler 'Authorization' bazıları 'X-Api-Key' ister. 
                    // Eczaneler.org genelde Bearer bekler.
                    'Authorization': `Bearer ${API_KEY}`,
                    'Content-Type': 'application/json'
                }
            });
            
            if (!response.ok) {
                throw new Error(`Hata Kodu: ${response.status}`);
            }

            const result = await response.json();
            loader.style.display = "none";

            if (result.data && result.data.length > 0) {
                result.data.forEach(e => {
                    // Koordinat bazlı hatasız harita linki
                    const mapUrl = (e.coordinates && e.coordinates.lat) 
                        ? `https://www.google.com/maps?q=${e.coordinates.lat},${e.coordinates.lon}`
                        : `https://www.google.com/maps/search/${encodeURIComponent(e.name + ' ' + city)}`;

                    listDiv.innerHTML += `
                        <div class="card">
                            <h2>${e.name}</h2>
                            <div class="hours"><i class="far fa-clock"></i> ${e.workingHours || 'Nöbetçi'}</div>
                            <div class="info"><i class="fas fa-map-marker-alt"></i> ${e.district} - ${e.address}</div>
                            <div class="info"><i class="fas fa-phone"></i> ${e.phone}</div>
                            <div class="btn-group">
                                <a href="tel:${e.phone}" class="btn btn-call">ARA</a>
                                <a href="${mapUrl}" target="_blank" class="btn btn-map">YOL TARİFİ</a>
                            </div>
                        </div>`;
                });
            } else {
                showError("Seçilen şehirde nöbetçi eczane bulunamadı.");
            }
        } catch (error) {
            loader.style.display = "none";
            // Hatayı daha detaylı gösteriyoruz
            showError(`Bağlantı Başarısız: ${error.message}`);
        }
    }

    // ... init ve showError fonksiyonları aynı kalacak
</script>
