<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kırşehir Nöbetçi Eczaneler</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #d63031; --bg: #f5f6fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .app { max-width: 500px; margin: auto; }
        header { text-align: center; color: var(--red); padding: 10px 0; }
        .status-badge { background: white; padding: 12px; border-radius: 12px; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .city-badge { background: var(--red); color: white; padding: 3px 10px; border-radius: 6px; font-weight: bold; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-left: 6px solid var(--red); position: relative; }
        .card h2 { margin: 0 0 8px 0; font-size: 1.2rem; color: #2d3436; }
        .info { font-size: 0.95rem; color: #636e72; margin: 6px 0; display: flex; align-items: flex-start; gap: 10px; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; text-align: center; padding: 12px; border-radius: 10px; text-decoration: none; color: white; font-weight: bold; font-size: 0.9rem; }
        .btn-call { background: #27ae60; }
        .btn-map { background: #2980b9; }
        #loader { text-align: center; padding: 40px; color: var(--red); }
        .error-btn { background: #636e72; color: white; padding: 10px; display: block; text-decoration: none; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app">
    <header>
        <h1><i class="fas fa-plus-square"></i> Nöbetçi Eczaneler</h1>
        <div id="tarih" style="font-size: 0.9rem; color: #636e72;"></div>
    </header>

    <div class="status-badge">
        📍 Konum: <span id="sehir" class="city-badge">KIRŞEHİR</span>
    </div>

    <div id="loader"><i class="fas fa-spinner fa-spin fa-3x"></i><br><br>Veriler Getiriliyor...</div>
    <div id="liste"></div>
</div>

<script>
    document.getElementById('tarih').innerText = new Date().toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

    async function eczaneleriGetir() {
        const listDiv = document.getElementById('liste');
        const loader = document.getElementById('loader');
        loader.style.display = "block";

        try {
            // Bu yöntem doğrudan bir web sitesindeki veriyi JSON'a çevirip bize getirir (CORS engeline takılmaz)
            const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://www.eczaneleri.net/kirsehir-nobetci-eczane'));
            const data = await response.json();
            
            const parser = new DOMParser();
            const doc = parser.parseFromString(data.contents, 'text/html');
            const cards = doc.querySelectorAll('.card'); 

            loader.style.display = "none";
            listDiv.innerHTML = "";

            if (cards.length > 0) {
                cards.forEach((card, index) => {
                    if(index < 5) { // İlk 5 eczaneyi al (reklamları elemek için)
                        const isim = card.querySelector('.card-title')?.innerText.trim() || "Eczane";
                        const adres = card.querySelector('.card-text')?.innerText.trim() || "Adres bilgisi için haritaya bakın.";
                        const tel = card.querySelector('.py-2.text-success')?.innerText.trim() || "";

                        listDiv.innerHTML += `
                            <div class="card">
                                <h2>${isim}</h2>
                                <div class="info"><i class="fas fa-map-marker-alt"></i> ${adres}</div>
                                <div class="info"><i class="fas fa-phone"></i> ${tel}</div>
                                <div class="btn-group">
                                    <a href="tel:${tel}" class="btn btn-call">ARA</a>
                                    <a href="https://www.google.com/maps/search/${encodeURIComponent(isim + ' ' + adres)}" target="_blank" class="btn btn-map">YOL TARİFİ</a>
                                </div>
                            </div>`;
                    }
                });
            } else {
                throw new Error("Veri bulunamadı");
            }
        } catch (error) {
            loader.style.display = "none";
            listDiv.innerHTML = `
                <div style="text-align:center; padding:20px; background:white; border-radius:15px;">
                    <p>Otomatik çekme şu an yapılamıyor.</p>
                    <a href="https://kirsehirism.saglik.gov.tr/TR,79610/nobetci-eczaneler.html" target="_blank" class="error-btn">RESMİ SİTEYE GİT</a>
                </div>`;
        }
    }

    eczaneleriGetir();
</script>

</body>
</html>
