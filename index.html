        .app { max-width: 500px; margin: auto; }
        header { text-align: center; color: var(--red); padding: 10px 0; }
        .status-badge { background: white; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 20px; font-size: 0.9rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center; gap: 5px; }
        
        .city-select { 
            background: var(--red); 
            color: white; 
            padding: 4px 8px; 
            border-radius: 5px; 
            font-weight: bold; 
            border: none; 
            outline: none; 
            font-size: 0.9rem; 
            cursor: pointer;
            text-transform: uppercase;
        }
        .city-select option { background: white; color: #333; text-transform: uppercase; }

        .card { background: white; border-radius: 15px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 6px solid #27ae60; background: #f9fff9; }
        .card h2 { margin: 0 0 5px 0; font-size: 1.1rem; color: #2d3436; text-transform: uppercase; }
        .info { font-size: 0.9rem; color: #555; margin: 5px 0; display: flex; align-items: flex-start; gap: 8px; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; text-align: center; padding: 12px; border-radius: 8px; text-decoration: none; color: white; font-weight: bold; font-size: 0.85rem; }
        .btn-call { background: #27ae60; }
        .btn-map { background: #2980b9; }
        #loader { text-align: center; display: none; padding: 30px; color: var(--red); }
        .error-card { background: #fff3f3; border: 1px solid #fab1a0; padding: 15px; border-radius: 10px; text-align: center; color: #c0392b; }
    </style>
</head>

<script>
    // Yeni NobetEcza API anahtarınız
    const API_KEY = "necz_fd1852ee8ca8e85d650ec0bb779809dddf9dca5176d7f60a"; 

    const dateDiv = document.getElementById('today');
    const citySelect = document.getElementById('citySelect');
    const listDiv = document.getElementById('list');
    const loader = document.getElementById('loader');

    dateDiv.innerText = new Date().toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

    citySelect.addEventListener('change', (e) => {
        if(e.target.value) {
            fetchData(e.target.value);
        }
    });

    async function init() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                    const data = await res.json();
                    let city = data.address.province || data.address.city || "kirsehir";
                    
                    city = city.replace(/İ/g, 'i').replace(/I/g, 'i').replace(/ı/g, 'i').replace(/Ş/g, 's').replace(/ş/g, 's').replace(/Ğ/g, 'g').replace(/ğ/g, 'g').replace(/Ü/g, 'u').replace(/ü/g, 'u').replace(/Ö/g, 'o').replace(/ö/g, 'o').replace(/Ç/g, 'c').replace(/ç/g, 'c').toLowerCase().trim();
                    
                    if(citySelect.querySelector(`option[value="${city}"]`)) {
                        citySelect.value = city;
                    } else {
                        citySelect.value = "kirsehir";
                    }
                    fetchData(citySelect.value);
                } catch (e) { 
                    setDefaultCity();
                }
            }, () => setDefaultCity());
        } else { 
            setDefaultCity();
        }
    }

    function setDefaultCity() {
        citySelect.value = "kirsehir";
        fetchData("kirsehir");
    }

    async function fetchData(city) {
        loader.style.display = "block";
        listDiv.innerHTML = "";

        // Seçilen şehre göre dinamik ilçe belirliyoruz. Kırşehir için doğrudan 'merkez' aratıyoruz.
        let ilce = "merkez";
        if(city === "istanbul") ilce = "kadikoy"; // Örnek test için dökümandaki gibi
        if(city === "ankara") ilce = "cankaya";

        try {
            // Sizin verdiğiniz resmi api.nobetecza.com uç noktası (endpoint)
            const response = await fetch(`https://api.nobetecza.com/v1/nobetci?il=${city}&ilce=${ilce}`, {
                method: 'GET',
                headers: {
                    'X-API-Key': API_KEY
                }
            });
            
            const data = await response.json();
            loader.style.display = "none";

            // Gelen veri doğrudan dizi (array) formatında veya data.data içinde olabilir, ikisini de destekliyoruz
            const eczaneListesi = Array.isArray(data) ? data : (data.data || []);

            if (eczaneListesi && eczaneListesi.length > 0) {
                renderPharmacies(eczaneListesi);
            } else {
                showError("Seçilen bölgede şu an aktif nöbetçi eczane bulunamadı.");
            }
        } catch (error) {
            loader.style.display = "none";
            showError("Bağlantı veya API anahtarı hatası oluştu.");
        }
    }

    function renderPharmacies(list) {
        listDiv.innerHTML = "";
        
        list.forEach(e => {
            // Yeni API'den gelen alan adlarına (name, address, phone) göre eşleme yapıyoruz
            const name = e.name || e.EczaneAdi || "";
            const address = e.address || e.Adres || "";
            const phone = e.phone || e.Telefon || "";
            
            const badgeText = `<span style="font-size:0.75rem; color:#27ae60; font-weight:bold; float:right;"><i class="fas fa-star"></i> MERKEZ</span>`;
            
            // Büyük harfe çevir ve temizle
            const cleanName = name.toUpperCase().replace("ECZANESİ", "").replace("ECZANE", "").trim() + " ECZANESİ";
            const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(cleanName + ' ' + address)}`;

            listDiv.innerHTML += `
                <div class="card">
                    <h2>${cleanName} ${badgeText}</h2>
                    <div class="info"><i class="fas fa-map-marker-alt"></i> ${address}</div>
                    <div class="info"><i class="fas fa-phone"></i> ${phone}</div>
                    <div class="btn-group">
                        <a href="tel:${phone}" class="btn btn-call">ARA</a>
                        <a href="${mapUrl}" target="_blank" class="btn btn-map">YOL TARİFİ</a>
                    </div>
                </div>`;
        });
    }

    function showError(msg) {
        listDiv.innerHTML = `<div class="error-card"><p>${msg}</p></div>`;
    }

    init();
</script>
