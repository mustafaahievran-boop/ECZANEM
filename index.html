<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nöbetçi Eczane</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#efeff2;
      display:flex;
      justify-content:center;
      padding:40px 20px;
      min-height:100vh;
    }

    .container{
      width:100%;
      max-width:700px;
      text-align:center;
    }

    .title{
      color:#df2f2f;
      font-size:48px;
      font-weight:bold;
      margin-bottom:10px;
    }

    .date{
      color:#7a7a7a;
      margin-bottom:25px;
      font-size:20px;
    }

    .selector-box{
      background:#fff;
      border-radius:16px;
      padding:18px;
      box-shadow:0 3px 10px rgba(0,0,0,.08);
      margin-bottom:25px;
    }

    select{
      padding:12px 18px;
      border:none;
      border-radius:8px;
      background:#d83232;
      color:white;
      font-size:16px;
      cursor:pointer;
      min-width:200px;
    }

    .result{
      background:#fff;
      border-radius:16px;
      padding:20px;
      box-shadow:0 3px 10px rgba(0,0,0,.08);
      text-align:left;
    }

    .pharmacy{
      border-left:5px solid #d83232;
      padding:16px;
      background:#fafafa;
      border-radius:10px;
      margin-bottom:15px;
    }

    .pharmacy h3{
      color:#d83232;
      margin-bottom:8px;
    }

    .error{
      border:1px solid #ff9b9b;
      background:#fff0f0;
      color:#d83232;
      padding:25px;
      border-radius:16px;
      font-size:20px;
    }

    .loading{
      color:#d83232;
      font-size:18px;
      text-align:center;
    }

    @media(max-width:600px){
      .title{
        font-size:34px;
      }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="title">➕ Nöbetçi Eczane</div>

  <div class="date" id="date"></div>

  <div class="selector-box">
    Şehir:
    <select id="city">
      <option value="KIRSEHIR">KIRŞEHİR</option>
      <option value="ANKARA">ANKARA</option>
      <option value="ISTANBUL">İSTANBUL</option>
      <option value="IZMIR">İZMİR</option>
      <option value="KAYSERI">KAYSERİ</option>
      <option value="KONYA">KONYA</option>
    </select>
  </div>

  <div id="content" class="result">
    <div class="loading">Yükleniyor...</div>
  </div>

</div>

<script>
  // API KEY
  const API_KEY = "4fSr6xIhOHxg0vHDbeJ8JG:2gLQOsj3tHEIR1wIGWKzi6";

  // BURAYI gerçek endpoint ile değiştir
  const API_URL = "https://api.collectapi.com/health/dutyPharmacy?il=";

  const citySelect = document.getElementById("city");
  const content = document.getElementById("content");

  // Tarih
  const today = new Date();
  const formattedDate = today.toLocaleDateString("tr-TR", {
    day: "numeric",
    month: "long",
    year: "numeric",
    weekday: "long"
  });

  document.getElementById("date").innerText = formattedDate;

  async function loadPharmacy(city){

    content.innerHTML =
      '<div class="loading">Eczaneler yükleniyor...</div>';

    try{

      const response = await fetch(
        API_URL + city,
        {
          headers:{
            "authorization":"apikey " + API_KEY,
            "content-type":"application/json"
          }
        }
      );

      if(!response.ok){
        throw new Error("API Hatası");
      }

      const data = await response.json();

      let pharmacies = data.result || data.data || [];

      if(pharmacies.length === 0){
        throw new Error("Veri bulunamadı");
      }

      content.innerHTML = "";

      pharmacies.forEach(item => {

        content.innerHTML += `
          <div class="pharmacy">
            <h3>${item.name || item.eczane_adi || "Eczane"}</h3>
            <p><b>Adres:</b> ${item.address || item.adres || "-"}</p>
            <p><b>Telefon:</b> ${item.phone || item.telefon || "-"}</p>
            <p><b>İlçe:</b> ${item.dist || item.ilce || "-"}</p>
          </div>
        `;
      });

    }catch(err){

      console.error(err);

      // fallback demo veri
      content.innerHTML = `
        <div class="error">
          Bağlantı hatası oluştu.<br><br>
          Demo veri gösteriliyor.
        </div>

        <div style="margin-top:20px">
          <div class="pharmacy">
            <h3>Merkez Eczanesi</h3>
            <p><b>Adres:</b> Ahi Evran Mahallesi</p>
            <p><b>Telefon:</b> 0386 111 22 33</p>
            <p><b>İlçe:</b> Merkez</p>
          </div>
        </div>
      `;
    }
  }

  citySelect.addEventListener("change", () => {
    loadPharmacy(citySelect.value);
  });

  loadPharmacy(citySelect.value);
</script>

</body>
</html>
