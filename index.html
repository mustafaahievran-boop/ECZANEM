<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nöbetçi Eczane Canlı</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #d63031; --bg: #f5f6fa; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .app { max-width: 500px; margin: auto; }
        header { text-align: center; color: var(--red); padding: 10px 0; }
        .status-badge { background: white; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 200px; font-size: 0.9rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center; gap: 5px; }
        
        .city-select { 
            background: var(--red); 
            color: white; 
            padding: 4px 8px; 
            border-radius: 5px; 
            font-weight: bold; 
            border: none; 
            outline: none; 
            font-size: 0.9rem; 
            cursor: pointer;
            text-transform: uppercase;
        }
        .city-select option { background: white; color: #333; text-transform: uppercase; }

        .card { background: white; border-radius: 15px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 6px solid var(--red); }
        .card.center-pharmacy { border-left: 6px solid #27ae60; background: #f9fff9; } 
        .card h2 { margin: 0 0 5px 0; font-size: 1.1rem; color: #2d3436; text-transform: uppercase; }
        .info { font-size: 0.9rem; color: #555; margin: 5px 0; display: flex; align-items: flex-start; gap: 8px; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; text-align: center; padding: 12px; border-radius: 8px; text-decoration: none; color: white; font-weight: bold; font-size: 0.85rem; }
        .btn-call { background: #27ae60; }
        .btn-map { background: #2980b9; }
        #loader { text-align: center; display: none; padding: 30px; color: var(--red); }
        .error-card { background: #fff3f3; border: 1px solid #fab1a0; padding: 15px; border-radius: 10px; text-align: center; color: #c0392b; }
    </style>
</head>
<body>

        <div id="today" style="font-size: 0.9rem; color: #888;"></div>
    </header>

    <div class="status-badge">
        📍 Şehir:

            <option value="bolu">Bolu</option>
            <option value="burdur">Burdur</option>
            <option value="bursa">Bursa</option>
            <option value="canakkale">Çanakkale</option>
            <option value="cankiri">Çankırı</option>
            <option value="corum">Çorum</option>

            <option value="diyarbakir">Diyarbakır</option>

            <option value="erzincan">Erzincan</option>

            <option value="izmir">İzmir</option>

            <option value="kastamonu">Kastamonu</option>
            <option value="kayseri">Kayseri</option>

            <option value="ardahan">Ardahan</option>
            <option value="igdir">Iğdır</option>
            <option value="yalova">Yalova</option>
            <option value="karabuk">Karabük</option>
            <option value="kilis">Kilis</option>
            <option value="osmaniye">Osmaniye</option>
            <option value="duzce">Düzce</option>
        </select>
    </div>

    <div id="loader"><i class="fas fa-spinner fa-spin fa-2x"></i><br><br>Canlı Veriler Sorgulanıyor...</div>
    <div id="list"></div>
</div>

<script>
    // Bakanlık verilerini anlık ve hatasız/bütünleşik çeken yeni güncel API servis havuzu
    // Bu sistemde kod içerisine statik eczane adı yazılmaz, her gün otomatik yenilenir.
    const dateDiv = document.getElementById('today');
    const citySelect = document.getElementById('citySelect');
    const listDiv = document.getElementById('list');
    const loader = document.getElementById('loader');

    dateDiv.innerText = new Date().toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

    citySelect.addEventListener('change', (e) => {
        if(e.target.value) {
            fetchData(e.target.value);
        }
    });

    async function init() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                    const data = await res.json();
                    let city = data.address.province || data.address.city || "kirsehir";
                    city = cleanCityName(city);
                    
                    if(citySelect.querySelector(`option[value="${city}"]`)) {
                        citySelect.value = city;
                    } else {
                        citySelect.value = "kirsehir";
                    }
                    fetchData(citySelect.value);
                } catch (e) { 
                    setDefaultCity();
                }
            }, () => setDefaultCity());
        } else { 
            setDefaultCity();
        }
    }

    function setDefaultCity() {
        citySelect.value = "kirsehir";
        fetchData("kirsehir");
    }

    function cleanCityName(str) {
        if (!str) return "";
        return str.toString()
            .replace(/İ/g, 'i').replace(/I/g, 'i').replace(/ı/g, 'i')
            .replace(/Ş/g, 's').replace(/ş/g, 's').replace(/Ğ/g, 'g')
            .replace(/ğ/g, 'g').replace(/Ü/g, 'u').replace(/ü/g, 'u')
            .replace(/Ö/g, 'o').replace(/ö/g, 'o').replace(/Ç/g, 'c')
            .replace(/ç/g, 'c').toLowerCase().trim();
    }

    async function fetchData(city) {
        loader.style.display = "block";
        listDiv.innerHTML = "";

        try {
            // CollectAPI'nin Merkez'i unutan yapısı yerine açık kaynaklı güncel havuzdan doğrudan çekim tetikleniyor
            const response = await fetch(`https://api.orhanaydogdu.com.tr/v2/nobetci-eczane?il=${city}`);
            const result = await response.json();
            loader.style.display = "none";

            if (result.success && result.result) {
                renderPharmacies(result.result);
            } else {
                // Yedek tetikleyici alternatif havuz senkronizasyonu
                fetchFallbackAPI(city);
            }
        } catch (error) {
            fetchFallbackAPI(city);
        }
    }

    async function fetchFallbackAPI(city) {
        // Ana sunucuda kesinti olursa CollectAPI'ye otomatik köprü kurar
        try {
            const response = await fetch(`https://api.collectapi.com/health/dutyPharmacy?il=${city}`, {
                method: 'GET',
                headers: {
                    'content-type': 'application/json',
                    'authorization': "apikey 4fSr6xIhOHxg0vHDbeJ8JG:2gLQOsj3tHEIR1wIGWKzi6"
                }
            });
            const result = await response.json();
            loader.style.display = "none";
            if (result.success && result.result) {
                renderPharmacies(result.result);
            } else {
                showError("Şu anda eczane verilerine ulaşılamıyor.");
            }
        } catch(e) {
            loader.style.display = "none";
            showError("Bağlantı hatası oluştu. Lütfen daha sonra tekrar deneyin.");
        }
    }

    function renderPharmacies(list) {
        listDiv.innerHTML = "";
        if (!list || list.length === 0) {
            listDiv.innerHTML = "<p style='text-align:center; padding: 20px; color:#888;'>Nöbetçi eczane kaydı bulunamadı.</p>";
            return;
        }

        list.forEach(e => {
            const dist = e.dist ? e.dist.toLowerCase() : "";
            const addr = e.address ? e.address.toLowerCase() : "";
            const isCenter = dist.includes("merkez") || addr.includes("merkez") || dist === "" || !dist;
            
            const cardClass = isCenter ? "card center-pharmacy" : "card";
            const badgeText = isCenter ? `<span style="font-size:0.75rem; color:#27ae60; font-weight:bold; float:right;"><i class="fas fa-star"></i> MERKEZ</span>` : "";
            
            const cleanName = e.name.toUpperCase().replace("ECZANESİ", "").replace("ECZANE", "").trim() + " ECZANESİ";
            const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(cleanName + ' ' + (e.address || citySelect.URIContent))}`;

            listDiv.innerHTML += `
                <div class="${cardClass}">
                    <h2>${cleanName} ${badgeText}</h2>
                    <div class="info"><i class="fas fa-map-marker-alt"></i> ${e.address}</div>
                    <div class="info"><i class="fas fa-phone"></i> ${e.phone}</div>
                    <div class="btn-group">
                        <a href="tel:${e.phone}" class="btn btn-call">ARA</a>
                        <a href="${mapUrl}" target="_blank" class="btn btn-map">YOL TARİFİ</a>
                    </div>
                </div>`;
        });
    }

    function showError(msg) {
        listDiv.innerHTML = `
            <div class="error-card">
                <i class="fas fa-exclamation-triangle fa-2x"></i><br><br>
                <p>${msg}</p>
                <a href="https://kirsehirism.saglik.gov.tr/TR,79610/nobetci-eczaneler.html" target="_blank" class="btn btn-map" style="display:inline-block; margin-top:10px;">RESMİ LİSTEYE GİT</a>
            </div>`;
    }

    init();
</script>

</html>
