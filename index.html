<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nöbetçi Eczane</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
<style>
:root{
    --red:#d63031;
    --bg:#f2f3f7;
}
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}
body{
    font-family:Arial,sans-serif;
    background:var(--bg);
    padding:18px;
}
.app{
    max-width:520px;
    margin:auto;
}
header{
    text-align:center;
    margin-bottom:20px;
}
header h1{
    color:var(--red);
    font-size:2rem;
}
#today{
    color:#777;
    margin-top:8px;
}
.status-badge{
    background:#fff;
    padding:16px;
    border-radius:16px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    box-shadow:0 4px 10px rgba(0,0,0,.06);
    margin-bottom:20px;
}
.city-select{
    border:none;
    background:var(--red);
    color:#fff;
    border-radius:8px;
    padding:10px 14px;
    font-weight:bold;
    outline:none;
    cursor:pointer;
}
#loader{
    display:none;
    text-align:center;
    padding:30px;
    color:var(--red);
}
.card{
    background:#fff;
    border-radius:18px;
    padding:18px;
    margin-bottom:14px;
    border-left:6px solid #27ae60;
    box-shadow:0 4px 14px rgba(0,0,0,.08);
}
.card h2{
    font-size:1rem;
    margin-bottom:10px;
    color:#222;
}
.info{
    display:flex;
    gap:10px;
    margin:10px 0;
    color:#555;
    font-size:.95rem;
}
.btn-group{
    display:flex;
    gap:10px;
    margin-top:15px;
}
.btn{
    flex:1;
    text-decoration:none;
    text-align:center;
    padding:12px;
    border-radius:10px;
    color:#fff;
    font-weight:bold;
}
.btn-call{
    background:#27ae60;
}
.btn-map{
    background:#2980b9;
}
.error-card{
    background:#fff1f1;
    border:1px solid #ffb6b6;
    border-radius:16px;
    text-align:center;
    padding:25px;
    color:#c0392b;
}
</style>
</head>
<body>
<div class="app">
<header>
    <h1><i class="fas fa-plus-square"></i> Nöbetçi Eczane</h1>
    <div id="today"></div>
</header>

<div class="status-badge">
    📍 Şehir:
    <select id="citySelect" class="city-select">
        <option value="kirsehir">Kırşehir</option>
        <option value="ankara">Ankara</option>
        <option value="istanbul">İstanbul</option>
        <option value="izmir">İzmir</option>
        <option value="kayseri">Kayseri</option>
        <option value="konya">Konya</option>
    </select>
</div>

<div id="loader">
    <i class="fas fa-spinner fa-spin fa-2x"></i>
    <br><br>
    Veriler yükleniyor...
</div>
<div id="list"></div>
</div>

<script>
// Yeni API Anahtarı
const API_KEY = "necz_fd1852ee8ca8e85d650ec0bb779809dddf9dca5176d7f60a";

const citySelect = document.getElementById("citySelect");
const listDiv = document.getElementById("list");
const loader = document.getElementById("loader");

document.getElementById("today").innerText = new Date().toLocaleDateString("tr-TR", {
    weekday:"long", day:"numeric", month:"long", year:"numeric"
});

citySelect.addEventListener("change", e => fetchData(e.target.value));

async function fetchData(city){
    loader.style.display = "block";
    listDiv.innerHTML = "";

    try{
        const response = await fetch(
            `https://api.collectapi.com/health/dutyPharmacy?il=${city}`,
            {
                method:"GET",
                headers:{
                    "content-type":"application/json",
                    "authorization": `apikey ${API_KEY}`
                }
            });

        if(!response.ok) {
            throw new Error(`API Hatası: ${response.status}`);
        }

        const json = await response.json();
        loader.style.display = "none";

        let pharmacies = json.result || [];

        if(!pharmacies.length){
            showError("Bu şehir için nöbetçi eczane verisi bulunamadı.");
            return;
        }

        pharmacies = uniqueList(pharmacies);
        renderPharmacies(pharmacies, city);

    }catch(err){
        console.error(err);
        loader.style.display = "none";
        showError("Veriler alınırken hata oluştu.<br><small>" + err.message + "</small>");
    }
}

function uniqueList(list){
    const seen = new Set();
    return list.filter(item => {
        const key = (item.name || "") + (item.phone || "");
        if(seen.has(key)) return false;
        seen.add(key);
        return true;
    });
}

function renderPharmacies(list, city){
    listDiv.innerHTML = "";
    let count = 0;

    list.forEach(e => {
        const dist = (e.dist || "").trim();
        const address = (e.address || "").trim();
        const name = (e.name || "Eczane").toUpperCase();
        const phone = e.phone || "Telefon yok";
        const displayDist = dist ? dist.toUpperCase() : "MERKEZ";

        let showThis = true;

        if (city === "kirsehir") {
            const merkezKelimeleri = ["merkez", "kırşehir", "merkez/kırşehir"];
            showThis = merkezKelimeleri.some(k => 
                dist.toLowerCase().includes(k) || address.toLowerCase().includes(k)
            ) || !dist;
        }
        else if (city === "istanbul") {
            showThis = /kadıköy|kadikoy/i.test(dist);
        }
        else if (city === "ankara") {
            showThis = /çankaya|cankaya/i.test(dist);
        }
        else if (city === "izmir") {
            showThis = /konak/i.test(dist);
        }

        if (!showThis) return;

        count++;

        const mapUrl = e.loc 
            ? `https://www.google.com/maps/search/?api=1&query=${e.loc}`
            : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name + " " + address)}`;

        listDiv.innerHTML += `
        <div class="card">
            <h2>
                ${name} 
                <span style="font-size:0.75rem; color:#27ae60; float:right;">
                    <i class="fas fa-star"></i> ${displayDist}
                </span>
            </h2>
            <div class="info">
                <i class="fas fa-map-marker-alt"></i> ${address || "Adres bilgisi yok"}
            </div>
            <div class="info">
                <i class="fas fa-phone"></i> ${phone}
            </div>
            <div class="info">
                <i class="fas fa-location-dot"></i> ${displayDist}
            </div>
            <div class="btn-group">
                <a href="tel:${phone}" class="btn btn-call">ARA</a>
                <a href="${mapUrl}" target="_blank" class="btn btn-map">YOL TARİFİ</a>
            </div>
        </div>`;
    });

    if (count === 0 && list.length > 0) {
        list.slice(0, 5).forEach(e => {
            const name = (e.name || "Eczane").toUpperCase();
            const address = e.address || "Adres yok";
            const phone = e.phone || "Telefon yok";
            const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name + " " + address)}`;

            listDiv.innerHTML += `
            <div class="card">
                <h2>${name} <span style="font-size:0.75rem; color:#777; float:right;">${(e.dist||"").toUpperCase()}</span></h2>
                <div class="info"><i class="fas fa-map-marker-alt"></i> ${address}</div>
                <div class="info"><i class="fas fa-phone"></i> ${phone}</div>
                <div class="btn-group">
                    <a href="tel:${phone}" class="btn btn-call">ARA</a>
                    <a href="${mapUrl}" target="_blank" class="btn btn-map">YOL TARİFİ</a>
                </div>
            </div>`;
        });
    }
}

function showError(message){
    listDiv.innerHTML = `
    <div class="error-card">
        <i class="fas fa-triangle-exclamation fa-2x"></i><br><br>
        ${message}
    </div>`;
}

// İlk yükleme
fetchData("kirsehir");
</script>
</body>
</html>
