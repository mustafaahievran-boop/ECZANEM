    <title>Nöbetçi Eczane Canlı</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #d63031; --bg: #f5f6fa; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .app { max-width: 500px; margin: auto; }
        header { text-align: center; color: var(--red); padding: 10px 0; }
        .status-badge { background: white; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 15px; font-size: 0.9rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center; gap: 5px; }
        
        .city-select { 
            background: var(--red); 
            color: white; 
            padding: 4px 8px; 
            border-radius: 5px; 
            font-weight: bold; 
            border: none; 
            outline: none; 
            font-size: 0.9rem; 
            cursor: pointer;
            text-transform: uppercase;
        }
        .city-select option { background: white; color: #333; text-transform: uppercase; }

        /* İlçe filtre alanı tasarımı */
        .district-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 5px 0 15px 0;
            white-space: nowrap;
            justify-content: center;
        }
        .district-container::-webkit-scrollbar { display: none; }
        .district-badge {
            background: white;
            color: #555;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid #ddd;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .district-badge.active {
            background: var(--red);
            color: white;
            border-color: var(--red);
        }

        .card { background: white; border-radius: 15px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 6px solid var(--red); }
        .card h2 { margin: 0 0 5px 0; font-size: 1.1rem; color: #2d3436; text-transform: uppercase; }
        .info { font-size: 0.9rem; color: #555; margin: 5px 0; display: flex; align-items: flex-start; gap: 8px; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; text-align: center; padding: 12px; border-radius: 8px; text-decoration: none; color: white; font-weight: bold; font-size: 0.85rem; }
        .btn-call { background: #27ae60; }
        .btn-map { background: #2980b9; }
        #loader { text-align: center; display: none; padding: 30px; color: var(--red); }
        .error-card { background: #fff3f3; border: 1px solid #fab1a0; padding: 15px; border-radius: 10px; text-align: center; color: #c0392b; }
    </style>
</head>
<body>

    <div id="districts" class="district-container"></div>

    <div id="loader"><i class="fas fa-spinner fa-spin fa-2x"></i><br><br>Canlı Veriler Sorgulanıyor...</div>
    <div id="list"></div>

<script>
    const API_KEY = "apikey 4fSr6xIhOHxg0vHDbeJ8JG:2gLQOsj3tHEIR1wIGWKzi6"; 

    const dateDiv = document.getElementById('today');
    const citySelect = document.getElementById('citySelect');
    const districtsDiv = document.getElementById('districts');
    const listDiv = document.getElementById('list');
    const loader = document.getElementById('loader');

    let allPharmacies = []; 

    dateDiv.innerText = new Date().toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

    citySelect.addEventListener('change', (e) => {
        if(e.target.value) {
            fetchData(e.target.value);
        }
    });

    async function init() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                    const data = await res.json();
                    let city = data.address.province || data.address.city || "kirsehir";
                    
                    city = city.replace(/İ/g, 'i').replace(/I/g, 'i').replace(/Ş/g, 's').replace(/Ğ/g, 'g').replace(/Ü/g, 'u').replace(/Ö/g, 'o').replace(/Ç/g, 'c').toLowerCase();
                    
                    if(citySelect.querySelector(`option[value="${city}"]`)) {
                        citySelect.value = city;
                    } else {
                        citySelect.value = "kirsehir";
                    }
                    fetchData(citySelect.value);
                } catch (e) { 
                    setDefaultCity();
                }
            }, () => setDefaultCity());
        } else { 
            setDefaultCity();
        }
    }

    function setDefaultCity() {
        citySelect.value = "kirsehir";
        fetchData("kirsehir");
    }

    async function fetchData(city) {
        loader.style.display = "block";
        listDiv.innerHTML = "";
        districtsDiv.innerHTML = "";
        allPharmacies = [];

        try {
            const response = await fetch(`https://api.collectapi.com/health/dutyPharmacy?il=${city}`, {
                method: 'GET',
                headers: {
                    'content-type': 'application/json',
                    'authorization': API_KEY
                }
            });
            
            const result = await response.json();
            loader.style.display = "none";

            if (result.success && result.result) {
                // Her eczaneye adresten bulduğumuz gerçek ilçe bilgisini enjekte ediyoruz
                allPharmacies = result.result.map(e => {
                    let detectedDist = e.dist || "Merkez";
                    
                    // Eğer API dist bilgisini boş geçtiyse adresten bulmaya çalış
                    if (e.address && (!e.dist || e.dist.toLowerCase() === city.toLowerCase())) {
                        const parts = e.address.split('/');
                        if (parts.length > 1) {
                            // "Kaman / Kırşehir" ifadesindeki Kaman kısmını temizle ve al
                            detectedDist = parts[parts.length - 2].trim().split(' ').pop();
                        }
                    }
                    return { ...e, computedDist: detectedDist };
                });
                
                createDistrictFilters();
                renderList(allPharmacies);
            } else {
                showError("Şu an veri alınamıyor. Aboneliğiniz henüz aktif olmamış olabilir.");
            }
        } catch (error) {
            loader.style.display = "none";
            showError("Bağlantı hatası! Lütfen internetinizi veya API anahtarınızı kontrol edin.");
        }
    }

    function createDistrictFilters() {
        districtsDiv.innerHTML = "";
        
        // Benzersiz ilçeleri al (Büyük harfe çevirerek eşleştir)
        const districts = [...new Set(allPharmacies.map(e => e.computedDist.toUpperCase()))].filter(Boolean);
        
        if(districts.length <= 1) return; 

        // HEPSİ Butonu
        const allBadge = document.createElement('div');
        allBadge.className = 'district-badge active';
        allBadge.innerText = 'HEPSİ';
        allBadge.onclick = () => {
            document.querySelectorAll('.district-badge').forEach(b => b.classList.remove('active'));
            allBadge.classList.add('active');
            renderList(allPharmacies);
        };
        districtsDiv.appendChild(allBadge);

        // İlçelerin Butonları
        districts.forEach(dist => {
            const badge = document.createElement('div');
            badge.className = 'district-badge';
            badge.innerText = dist;
            badge.onclick = () => {
                document.querySelectorAll('.district-badge').forEach(b => b.classList.remove('active'));
                badge.classList.add('active');
                
                const filtered = allPharmacies.filter(e => e.computedDist.toUpperCase() === dist);
                renderList(filtered);
            };
            districtsDiv.appendChild(badge);
        });
    }

    function renderList(pharmacies) {
        listDiv.innerHTML = "";
        if(pharmacies.length === 0) {
            listDiv.innerHTML = "<p style='text-align:center; color:#888;'>Bu bölgede nöbetçi eczane bulunamadı.</p>";
            return;
        }

        pharmacies.forEach(e => {
            listDiv.innerHTML += `
                <div class="card">
                    <h2>${e.name} <span style="font-size:0.75rem; color:#888; font-weight:normal; float:right; text-transform:uppercase;">(${e.computedDist})</span></h2>
                    <div class="info"><i class="fas fa-map-marker-alt"></i> ${e.address}</div>
                    <div class="info"><i class="fas fa-phone"></i> ${e.phone}</div>
                    <div class="btn-group">
                        <a href="tel:${e.phone}" class="btn btn-call">ARA</a>
                        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(e.name + ' ' + e.address)}" target="_blank" class="btn btn-map">YOL TARİFİ</a>
                    </div>
                </div>`;
        });
    }

    function showError(msg) {
        listDiv.innerHTML = `
            <div class="error-card">
                <i class="fas fa-exclamation-triangle fa-2x"></i><br><br>
                <p>${msg}</p>
                <a href="https://kirsehirism.saglik.gov.tr/TR,79610/nobetci-eczaneler.html" target="_blank" class="btn btn-map" style="display:inline-block; margin-top:10px;">RESMİ LİSTEYE GİT</a>
            </div>`;
    }

    init();
</script>
