<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nöbetçi Eczane Canlı</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #d63031; --bg: #f5f6fa; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .app { max-width: 500px; margin: auto; }
        header { text-align: center; color: var(--red); padding: 10px 0; }
        .status-badge { background: white; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 20px; font-size: 0.9rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center; gap: 5px; }
        
        .city-select { 
            background: var(--red); 
            color: white; 
            padding: 4px 8px; 
            border-radius: 5px; 
            font-weight: bold; 
            border: none; 
            outline: none; 
            font-size: 0.9rem; 
            cursor: pointer;
            text-transform: uppercase;
        }
        .city-select option { background: white; color: #333; text-transform: uppercase; }

        .card { background: white; border-radius: 15px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 6px solid var(--red); }
        .card.center-pharmacy { border-left: 6px solid #27ae60; background: #f9fff9; } 
        .card h2 { margin: 0 0 5px 0; font-size: 1.1rem; color: #2d3436; text-transform: uppercase; }
        .info { font-size: 0.9rem; color: #555; margin: 5px 0; display: flex; align-items: flex-start; gap: 8px; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; text-align: center; padding: 12px; border-radius: 8px; text-decoration: none; color: white; font-weight: bold; font-size: 0.85rem; }
        .btn-call { background: #27ae60; }
        .btn-map { background: #2980b9; }
        #loader { text-align: center; display: none; padding: 30px; color: var(--red); }
        .error-card { background: #fff3f3; border: 1px solid #fab1a0; padding: 15px; border-radius: 10px; text-align: center; color: #c0392b; }
    </style>
</head>
<body>

<div class="app">
    <header>
        <h1><i class="fas fa-plus-square"></i> Nöbetçi Eczane</h1>
        <div id="today" style="font-size: 0.9rem; color: #888;"></div>
    </header>

    <div class="status-badge">
        📍 Şehir: 
        <select id="citySelect" class="city-select">
            <option value="kirsehir">Kırşehir</option>
        </select>
    </div>

    <div id="loader"><i class="fas fa-spinner fa-spin fa-2x"></i><br><br>Canlı Veriler Sorgulanıyor...</div>
    <div id="list"></div>
</div>

<script>
    // BURASI ÇOK ÖNEMLİ: Pastebin, GitHub gists veya kendi sunucundaki bir .json dosyasının linkini buraya koyacaksın.
    // Şimdilik test etmen için bugünün Merkez eczanelerini geçici bir simülasyon fonksiyonuyla bağlıyorum.
    const MERKEZ_VERI_LINKI = "https://api.myjson.online/v1/records/..."; 

    const dateDiv = document.getElementById('today');
    const listDiv = document.getElementById('list');
    const loader = document.getElementById('loader');

    dateDiv.innerText = new Date().toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

    async function baslat() {
        loader.style.display = "block";
        
        // 1. ADIM: Dinamik Merkez Verisini Getir (Her gün değişen kısım)
        // Gerçek sistemde burası `fetch(MERKEZ_VERI_LINKI)` üzerinden okunacak.
        const dinamikMerkezListesi = [
            { name: "BEYAZ ECZANESİ", address: "Medrese Mahallesi, Dr. İsmail Yağız Caddesi No:2/5 Merkez / Kırşehir", phone: "03862121416", dist: "Merkez" },
            { name: "ZEYNEP ECZANESİ", address: "Medrese Mahallesi, 58 Sokak Yeşilkent Apt Altı No:2/4 Merkez / Kırşehir", phone: "03862134949", dist: "Merkez" }
        ];

        // 2. ADIM: İlçeleri API'den Canlı Çek
        try {
            const response = await fetch(`https://api.collectapi.com/health/dutyPharmacy?il=kirsehir`, {
                method: 'GET',
                headers: {
                    'content-type': 'application/json',
                    'authorization': "apikey 4fSr6xIhOHxg0vHDbeJ8JG:2gLQOsj3tHEIR1wIGWKzi6"
                }
            });
            const result = await response.json();
            loader.style.display = "none";

            let apiIlceler = [];
            if (result.success && result.result) {
                // API'den gelen Merkez tekrarlarını veya hatalarını tamamen temizle (Sadece Akdeniz, Kayış vb. kalır)
                apiIlceler = result.result.filter(e => {
                    const d = (e.dist || "").toLowerCase();
                    const a = (e.address || "").toLowerCase();
                    return !d.includes("merkez") && !a.includes("merkez");
                });
            }

            // 3. ADIM: Dinamik Merkezleri ve Canlı İlçeleri Birleştir
            const birlesikListe = [...dinamikMerkezListesi, ...apiIlceler];
            renderPharmacies(birlesikListe);

        } catch (error) {
            loader.style.display = "none";
            // İnternet kopsa bile eldeki Merkez verisini göster
            renderPharmacies(dinamikMerkezListesi);
        }
    }

    function renderPharmacies(list) {
        listDiv.innerHTML = "";
        list.forEach(e => {
            const dist = (e.dist || "").toLowerCase();
            const addr = (e.address || "").toLowerCase();
            const isCenter = dist.includes("merkez") || addr.includes("merkez");
            
            const cardClass = isCenter ? "card center-pharmacy" : "card";
            const badgeText = isCenter ? 
                `<span style="font-size:0.75rem; color:#27ae60; font-weight:bold; float:right;"><i class="fas fa-star"></i> MERKEZ</span>` : 
                `<span style="font-size:0.75rem; color:#d63031; font-weight:bold; float:right;"><i class="fas fa-map-signs"></i> ${(e.dist || "İLÇE").toUpperCase()}</span>`;
            
            const cleanName = e.name.toUpperCase().replace("ECZANESİ", "").replace("ECZANE", "").trim() + " ECZANESİ";
            const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(cleanName + ' ' + e.address)}`;

            listDiv.innerHTML += `
                <div class="${cardClass}">
                    <h2>${cleanName} ${badgeText}</h2>
                    <div class="info"><i class="fas fa-map-marker-alt"></i> ${e.address}</div>
                    <div class="info"><i class="fas fa-phone"></i> ${e.phone}</div>
                    <div class="btn-group">
                        <a href="tel:${e.phone}" class="btn btn-call">ARA</a>
                        <a href="${mapUrl}" target="_blank" class="btn btn-map">YOL TARİFİ</a>
                    </div>
                </div>`;
        });
    }

    baslat();
</script>
</body>
</html>
