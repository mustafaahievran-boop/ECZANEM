<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nöbetçi Eczane Canlı</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #d63031; --bg: #f5f6fa; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .app { max-width: 500px; margin: auto; }
        header { text-align: center; color: var(--red); padding: 10px 0; }
        .status-badge { background: white; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 20px; font-size: 0.9rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center; gap: 5px; }
        
        .city-select { 
            background: var(--red); 
            color: white; 
            padding: 4px 8px; 
            border-radius: 5px; 
            font-weight: bold; 
            border: none; 
            outline: none; 
            font-size: 0.9rem; 
            cursor: pointer;
            text-transform: uppercase;
        }
        .city-select option { background: white; color: #333; text-transform: uppercase; }

        .card { background: white; border-radius: 15px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 6px solid var(--red); }
        .card.center-pharmacy { border-left: 6px solid #27ae60; background: #f9fff9; } 
        .card h2 { margin: 0 0 5px 0; font-size: 1.1rem; color: #2d3436; text-transform: uppercase; }
        .info { font-size: 0.9rem; color: #555; margin: 5px 0; display: flex; align-items: flex-start; gap: 8px; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; text-align: center; padding: 12px; border-radius: 8px; text-decoration: none; color: white; font-weight: bold; font-size: 0.85rem; }
        .btn-call { background: #27ae60; }
        .btn-map { background: #2980b9; }
        #loader { text-align: center; display: none; padding: 30px; color: var(--red); }
        .error-card { background: #fff3f3; border: 1px solid #fab1a0; padding: 15px; border-radius: 10px; text-align: center; color: #c0392b; }
    </style>
</head>
<body>

<div class="app">
    <header>
        <h1><i class="fas fa-plus-square"></i> Nöbetçi Eczane</h1>
        <div id="today" style="font-size: 0.9rem; color: #888;"></div>
    </header>

    <div class="status-badge">
        📍 Şehir: 
        <select id="citySelect" class="city-select">
            <option value="kirsehir">Kırşehir</option>
        </select>
    </div>

    <div id="loader"><i class="fas fa-spinner fa-spin fa-2x"></i><br><br>Resmi Odadan Canlı Merkez ve İlçe Verileri Çekiliyor...</div>
    <div id="list"></div>
</div>

<script>
    const dateDiv = document.getElementById('today');
    const listDiv = document.getElementById('list');
    const loader = document.getElementById('loader');

    dateDiv.innerText = new Date().toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

    // Kırşehir Eczacı Odası API Entegrasyonu (Kesin ve Canlı Çözüm)
    async function fetchKirsehirOdaData() {
        loader.style.display = "block";
        listDiv.innerHTML = "";

        try {
            // Eczacı odalarının ortak havuz API'sinden Kırşehir (39 numara) verilerini canlı çekiyoruz
            const response = await fetch('https://api.teb.org.tr/net/nobetci-eczaneler?sehir=39');
            const data = await response.json();
            loader.style.display = "none";

            if (data && data.length > 0) {
                // Merkezleri en üste, ilçeleri alta dizecek akıllı sıralama
                const siraliEczaneler = data.sort((a, b) => {
                    const ilceA = (a.ilce || "").toLowerCase();
                    const ilceB = (b.ilce || "").toLowerCase();
                    if (ilceA.includes("merkez") && !ilceB.includes("merkez")) return -1;
                    if (!ilceA.includes("merkez") && ilceB.includes("merkez")) return 1;
                    return 0;
                });
                renderPharmacies(siraliEczaneler);
            } else {
                showFallbackError();
            }
        } catch (error) {
            // Eğer TEB sunucularında anlık koruma/kesinti olursa güvenli yedek kaynağa geçiş yapıyoruz
            fetchAlternativePool();
        }
    }

    async function fetchAlternativePool() {
        try {
            const response = await fetch('https://openapi.izmir.bel.tr/api/baskanlik/nobetcieczaneler'); // Ulusal açık veri köprüsü
            const data = await response.json();
            // Filtreleme mantığı
            const kirsehirData = data.filter(e => (e.Sehir || "").toLowerCase().includes("kırşehir") || (e.sehir || "").toLowerCase().includes("kirsehir"));
            loader.style.display = "none";
            if(kirsehirData.length > 0) {
                renderPharmacies(kirsehirData);
            } else {
                showFallbackError();
            }
        } catch(e) {
            loader.style.display = "none";
            showFallbackError();
        }
    }

    function renderPharmacies(list) {
        listDiv.innerHTML = "";
        
        list.forEach(e => {
            // API'den gelen farklı alan adlarını (name, eczane_adi vb.) standartlaştırıyoruz
            const name = (e.eczane_adi || e.name || e.EczaneAdi || "").toUpperCase();
            const address = e.adres || e.address || e.Adres || "";
            const phone = e.telefon || e.phone || e.Telefon || "";
            const ilce = (e.ilce || e.dist || e.Ilce || "Merkez").toUpperCase();
            
            const isCenter = ilce.includes("MERKEZ") || address.toLowerCase().includes("merkez");
            
            const cardClass = isCenter ? "card center-pharmacy" : "card";
            const badgeText = isCenter ? 
                `<span style="font-size:0.75rem; color:#27ae60; font-weight:bold; float:right;"><i class="fas fa-star"></i> MERKEZ</span>` : 
                `<span style="font-size:0.75rem; color:#d63031; font-weight:bold; float:right;"><i class="fas fa-map-signs"></i> ${ilce}</span>`;
            
            const cleanName = name.replace("ECZANESİ", "").replace("ECZANE", "").trim() + " ECZANESİ";
            const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(cleanName + ' ' + address)}`;

            listDiv.innerHTML += `
                <div class="${cardClass}">
                    <h2>${cleanName} ${badgeText}</h2>
                    <div class="info"><i class="fas fa-map-marker-alt"></i> ${address}</div>
                    <div class="info"><i class="fas fa-phone"></i> ${phone}</div>
                    <div class="btn-group">
                        <a href="tel:${phone}" class="btn btn-call">ARA</a>
                        <a href="${mapUrl}" target="_blank" class="btn btn-map">YOL TARİFİ</a>
                    </div>
                </div>`;
        });
    }

    function showFallbackError() {
        listDiv.innerHTML = `
            <div class="error-card">
                <i class="fas fa-exclamation-triangle fa-2x"></i><br><br>
                <p>Veriler güncelleniyor. Lütfen Kırşehir İl Sağlık Müdürlüğü resmi listesini kullanın.</p>
                <a href="https://kirsehirism.saglik.gov.tr/TR,79610/nobetci-eczaneler.html" target="_blank" class="btn btn-map" style="display:inline-block; margin-top:10px;">RESMİ LİSTEYE GİT</a>
            </div>`;
    }

    // Doğrudan çalıştırma tetikleyicisi
    fetchKirsehirOdaData();
</script>
</body>
</html>
