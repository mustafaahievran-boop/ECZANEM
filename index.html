<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nöbetçi Eczane Otomatik</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #d63031; --bg: #f5f6fa; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .app { max-width: 500px; margin: auto; }
        header { text-align: center; color: var(--red); padding: 10px 0; }
        .status-badge { background: white; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 20px; font-size: 0.9rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .city-name { background: var(--red); color: white; padding: 2px 8px; border-radius: 5px; font-weight: bold; }
        .card { background: white; border-radius: 15px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 6px solid var(--red); }
        .card h2 { margin: 0 0 5px 0; font-size: 1.1rem; color: #2d3436; text-transform: uppercase; }
        .info { font-size: 0.9rem; color: #555; margin: 5px 0; display: flex; align-items: flex-start; gap: 8px; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; text-align: center; padding: 12px; border-radius: 8px; text-decoration: none; color: white; font-weight: bold; font-size: 0.85rem; }
        .btn-call { background: #27ae60; }
        .btn-map { background: #2980b9; }
        #loader { text-align: center; display: none; padding: 30px; color: var(--red); }
    </style>
</head>
<body>

<div class="app">
    <header>
        <h1><i class="fas fa-hospital-alt"></i> Nöbetçi Eczane</h1>
        <div id="today" style="font-size: 0.9rem; color: #888;"></div>
    </header>

    <div class="status-badge">
        📍 Şehir: <span id="currentCity" class="city-name">Tespit ediliyor...</span>
    </div>

    <div id="loader"><i class="fas fa-spinner fa-spin fa-2x"></i><br><br>Canlı Veriler Çekiliyor...</div>
    <div id="list"></div>
</div>

<script>
    // ANAHTARIN BURAYA DOĞRU ŞEKİLDE EKLENDİ
    const API_KEY = "apikey 4fSr6xIhOHxg0vHDbeJ8JG:2gLQOsj3tHEIR1wIGWKzi6"; 

    const dateDiv = document.getElementById('today');
    const citySpan = document.getElementById('currentCity');
    const listDiv = document.getElementById('list');
    const loader = document.getElementById('loader');

    dateDiv.innerText = new Date().toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

    async function init() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                    const data = await res.json();
                    let city = data.address.province || data.address.city || "Kirsehir";
                    city = city.replace(/İ/g, 'i').replace(/I/g, 'i').replace(/Ş/g, 's').replace(/Ğ/g, 'g').replace(/Ü/g, 'u').replace(/Ö/g, 'o').replace(/Ç/g, 'c').toLowerCase();
                    citySpan.innerText = city.toUpperCase();
                    fetchData(city);
                } catch (e) { fetchData("kirsehir"); }
            }, () => fetchData("kirsehir"));
        } else { fetchData("kirsehir"); }
    }

    async function fetchData(city) {
        loader.style.display = "block";
        listDiv.innerHTML = "";

        try {
            const response = await fetch(`https://api.collectapi.com/health/dutyPharmacy?il=${city}`, {
                headers: {
                    "content-type": "application/json",
                    "authorization": API_KEY
                }
            });
            const result = await response.json();
            loader.style.display = "none";

            if (result.success) {
                result.result.forEach(e => {
                    listDiv.innerHTML += `
                        <div class="card">
                            <h2>${e.name}</h2>
                            <div class="info"><i class="fas fa-map-marker-alt"></i> ${e.address}</div>
                            <div class="info"><i class="fas fa-phone"></i> ${e.phone}</div>
                            <div class="btn-group">
                                <a href="tel:${e.phone}" class="btn btn-call">ARA</a>
                                <a href="http://www.google.com/maps/search/?api=1&query=${encodeURIComponent(e.name + ' ' + e.address)}" target="_blank" class="btn btn-map">YOL TARİFİ</a>
                            </div>
                        </div>`;
                });
            } else {
                listDiv.innerHTML = "<p style='text-align:center;'>Veri çekilemedi. API anahtarını veya aboneliğini kontrol et.</p>";
            }
        } catch (error) {
            loader.style.display = "none";
            listDiv.innerHTML = "<p style='text-align:center;'>Bağlantı hatası oluştu.</p>";
        }
    }

    init();
</script>
</body>
</html>
